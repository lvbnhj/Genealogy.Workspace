name: Build release bundle

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Build runtime-only bundle
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name || format('build-{0}', github.run_number) }}
        run: ./scripts/package_release.sh "$RELEASE_VERSION"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: genealogy-workspace-${{ github.run_number }}
          path: |
            artifacts/Genealogy.Workspace-*.tar.gz
            artifacts/Genealogy.Workspace-*.zip
          if-no-files-found: error

      - name: Attach bundle to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          artifacts/Genealogy.Workspace-*.tar.gz
          artifacts/Genealogy.Workspace-*.zip
          --clobber

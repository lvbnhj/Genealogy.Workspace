name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Configure isolated PostgreSQL instance
        shell: bash
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=ci-only-password/' .env
          sed -i 's/^PGPORT=.*/PGPORT=55432/' .env
          sed -i 's/^CONTAINER_NAME=.*/CONTAINER_NAME=genealogy-ci-${{ github.run_id }}-${{ github.run_attempt }}/' .env

      - name: Restore
        run: dotnet restore Genealogy.Workspace.sln

      - name: Build
        run: dotnet build Genealogy.Workspace.sln -c Release --no-restore

      - name: Verify prebuilt runtime installer
        shell: bash
        run: |
          ./scripts/package_release.sh ci
          install_dir="$(mktemp -d)"
          ./scripts/bootstrap.sh \
            --asset-url "file://$PWD/artifacts/Genealogy.Workspace-ci.tar.gz" \
            --version ci \
            --install-dir "$install_dir" \
            --client codex \
            --no-start
          test -f "$install_dir/app/mcp/Genealogy.Workspace.McpServer.dll"
          test -f "$install_dir/app/migrator/Genealogy.Workspace.Migrator.dll"
          test -f "$install_dir/.codex/config.toml"
          test ! -d "$install_dir/src"
          grep -F "command = \"$install_dir/run-mcp.sh\"" \
            "$install_dir/.codex/config.toml"

      - name: Run GEDCOM Python tests
        run: python3 -m unittest discover -s tools/gedcom/tests -p 'test_*.py' -v

      - name: Run .NET tests
        run: >-
          dotnet test Genealogy.Workspace.sln
          -c Release
          --no-build
          --no-restore
          --logger "trx;LogFileName=genealogy-tests.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_id }}
          path: TestResults/
          if-no-files-found: ignore

      - name: Stop test PostgreSQL
        if: always()
        run: docker compose --project-directory . down -v --remove-orphans
